  <script type="text/babel">
gsap.registerPlugin(ScrollTrigger);

// ---- Overlay style helpers ----
function setOverlay(el, p, i0, i1, o0, o1) {
  let op, y;
  if (p <= i0 || p >= o1) { op = 0; y = 20; }
  else if (p < i1) { const t = (p - i0) / (i1 - i0); op = t; y = 20 * (1 - t); }
  else if (p > o0) { const t = (p - o0) / (o1 - o0); op = 1 - t; y = 20 * t; }
  else             { op = 1; y = 0; }
  el.style.opacity   = op;
  el.style.transform = `translateY(${y}px)`;
}

// ---- Hero video (scroll-fades text) ----
const HeroVideo = () => {
  const containerRef = React.useRef(null);
  const [progress, setProgress] = React.useState(0);

  React.useEffect(() => {
    const onScroll = () => {
      const el = containerRef.current;
      if (!el) return;
      const scrolled = window.scrollY - el.offsetTop;
      const total = el.offsetHeight - window.innerHeight;
      setProgress(Math.max(0, Math.min(1, scrolled / total)));
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const t1   = progress < 0.3  ? 1 : progress < 0.5  ? 1 - (progress - 0.3) / 0.2 : 0;
  const t2   = progress < 0.42 ? 0 : progress < 0.62 ? (progress - 0.42) / 0.2     : 1;
  const hint = progress < 0.12 ? 1 : progress < 0.22 ? 1 - (progress - 0.12) / 0.1 : 0;

  return (
    <div ref={containerRef} className="hero-scroll-container">
      <div className="hero-sticky">
        <video className="hero-video" src="hero.mp4" autoPlay muted loop playsInline />
        <div className="hero-overlay" />
        <div className="hero-text-wrap">
          <div className="hero-text-1" style={{ opacity: t1 }}>
            <span className="brand-line">Harvest Biosolutions</span>
            <span className="sub-line">Consumer Health · Science-First</span>
          </div>
          <div className="hero-text-2" style={{ opacity: t2 }}>
            <p>Built on science.<br />Made to matter.</p>
          </div>
        </div>
        <div className="hero-scroll-hint" style={{ opacity: hint }}>
          <div className="hero-scroll-hint-line" />
          <span>Scroll</span>
        </div>
      </div>
    </div>
  );
};

// ---- Microbe scroll video ----
const MicrobeVideo = () => {
  const containerRef = React.useRef(null);
  const videoRef     = React.useRef(null);
  const overlay1Ref  = React.useRef(null);
  const overlay2Ref  = React.useRef(null);

  React.useEffect(() => {
    const container = containerRef.current;
    const video     = videoRef.current;
    const ov1       = overlay1Ref.current;
    const ov2       = overlay2Ref.current;
    if (!container || !video) return;

    let rawP  = 0;   // scroll progress [0,1]
    let goalP = 0;   // lightly smoothed target
    let rafId;
    const DEAD = 0.04; // seconds — tolerance before we act

    const onScroll = () => {
      const rect  = container.getBoundingClientRect();
      const range = container.offsetHeight - window.innerHeight;
      rawP = Math.max(0, Math.min(1, -rect.top / range));
    };

    const tick = () => {
      // Small lerp so backward seeking doesn't jump too hard
      goalP += (rawP - goalP) * 0.14;

      if (video.duration) {
        const goal = goalP * video.duration;
        const diff = goal - video.currentTime;

        if (diff > DEAD) {
          // ── FORWARD: let the browser play — hardware-decoded, silky smooth ──
          const rate = Math.min(diff * 5, 8);   // proportional speed, cap 8×
          if (video.playbackRate !== rate) video.playbackRate = rate;
          if (video.paused) video.play().catch(() => {});
          // Brake: stop just before we overshoot
          if (video.currentTime + DEAD >= goal) video.pause();

        } else if (diff < -DEAD) {
          // ── BACKWARD: must seek (no way to play in reverse) ──
          if (!video.paused) video.pause();
          if (!video.seeking)  video.currentTime = goal;

        } else {
          // ── AT TARGET: idle ──
          if (!video.paused) video.pause();
        }

        // Overlays track where the video frame actually is
        const p = video.currentTime / video.duration;
        if (ov1) setOverlay(ov1, p, 0.28, 0.37, 0.52, 0.60);
        if (ov2) setOverlay(ov2, p, 0.62, 0.70, 0.88, 0.97);
      }

      rafId = requestAnimationFrame(tick);
    };

    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    rafId = requestAnimationFrame(tick);

    return () => {
      window.removeEventListener('scroll', onScroll);
      cancelAnimationFrame(rafId);
      video.pause();
    };
  }, []);

  return (
    <div ref={containerRef} className="microbe-container" style={{ height: "350vh" }}>
      <div className="microbe-sticky">
        <video ref={videoRef} className="microbe-video" src="pill.mp4" preload="auto" muted playsInline />
        <div ref={overlay1Ref} className="microbe-overlay">
          <p>We are currently under development</p>
        </div>
        <div ref={overlay2Ref} className="microbe-overlay">
          <p>But we are at your front door</p>
          <p className="punchline">Summer 2026</p>
        </div>
      </div>
    </div>
  );
};

const Partners = () => {

  const [sent, setSent] = React.useState(false);
  const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));

  return (

          <h2 className="partners-head">Interested in<br />partnering?</h2>

        </div>
        <div>
          {!sent ? (
            <form className="contact-form" onSubmit={e => { e.preventDefault(); setSent(true); }}>
              <div className="form-row">
                <div className="form-field">
                  <label>Name</label>
                  <input type="text" placeholder="Your name" value={form.name} onChange={set("name")} required />
                </div>
                <div className="form-field">
                  <label>Company</label>
                  <input type="text" placeholder="Your company" value={form.company} onChange={set("company")} />
                </div>
              </div>
              <div className="form-field">
                <label>Email</label>
                <input type="email" placeholder="your@email.com" value={form.email} onChange={set("email")} required />
              </div>
              <div className="form-field">
                <label>Message</label>
                <textarea placeholder="Tell us how you'd like to work together..." value={form.message} onChange={set("message")} />
              </div>
              <button type="submit" className="form-submit">Send message</button>
            </form>
          ) : (

          )}
        </div>
      </div>
    </section>
  );
};

// ---- Coming soon ----
const ComingSoon = () => {
