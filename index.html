// ---- Overlay style helpers ----
function setOverlay(el, p, i0, i1, o0, o1) {
  let op, y;
  if (p <= i0 || p >= o1) { op = 0; y = 20; }
  else if (p < i1) { const t = (p - i0) / (i1 - i0); op = t; y = 20 * (1 - t); }
  else if (p > o0) { const t = (p - o0) / (o1 - o0); op = 1 - t; y = 20 * t; }
  else             { op = 1; y = 0; }
  el.style.opacity   = op;
  el.style.transform = `translateY(${y}px)`;
}

// ---- Hero video (scroll-fades text) ----
const HeroVideo = () => {
  const containerRef = React.useRef(null);
  const [progress, setProgress] = React.useState(0);

  React.useEffect(() => {
    const onScroll = () => {
      const el = containerRef.current;
      if (!el) return;
      const scrolled = window.scrollY - el.offsetTop;
      const total = el.offsetHeight - window.innerHeight;
      setProgress(Math.max(0, Math.min(1, scrolled / total)));
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const t1   = progress < 0.3  ? 1 : progress < 0.5  ? 1 - (progress - 0.3) / 0.2 : 0;
  const t2   = progress < 0.42 ? 0 : progress < 0.62 ? (progress - 0.42) / 0.2     : 1;
  const hint = progress < 0.12 ? 1 : progress < 0.22 ? 1 - (progress - 0.12) / 0.1 : 0;

  return (
    <div ref={containerRef} className="hero-scroll-container">
      <div className="hero-sticky">
        <video className="hero-video" src="hero.mp4" autoPlay muted loop playsInline />
        <div className="hero-overlay" />
        <div className="hero-text-wrap">
          <div className="hero-text-1" style={{ opacity: t1 }}>
            <span className="brand-line">Harvest Biosolutions</span>
            <span className="sub-line">Consumer Health · Science-First</span>
          </div>
          <div className="hero-text-2" style={{ opacity: t2 }}>
            <p>Built on science.<br />Made to matter.</p>
          </div>
        </div>
        <div className="hero-scroll-hint" style={{ opacity: hint }}>
          <div className="hero-scroll-hint-line" />
          <span>Scroll</span>
        </div>
      </div>
    </div>
  );
};

// ---- Microbe scroll video ----
const MicrobeVideo = () => {
  const containerRef = React.useRef(null);
  const canvasRef    = React.useRef(null);
  const overlay1Ref  = React.useRef(null);
  const overlay2Ref  = React.useRef(null);
  const [loadPct, setLoadPct] = React.useState(0);
  const [ready, setReady]     = React.useState(false);

  React.useEffect(() => {
    const container = containerRef.current;

    let rafId;

    const drawFrame = (idx) => {
      const f = frames[Math.min(Math.max(0, idx), frames.length - 1)];
      if (!f) return;
      const cw = canvas.width, ch = canvas.height;
      const fw = f.width, fh = f.height;
      const scale = Math.max(cw / fw, ch / fh);
      ctx.clearRect(0, 0, cw, ch);
      ctx.drawImage(f, (cw - fw * scale) / 2, (ch - fh * scale) / 2, fw * scale, fh * scale);
    };

    const resize = () => {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width  = canvas.offsetWidth  * dpr;
      canvas.height = canvas.offsetHeight * dpr;
      if (lastIdx >= 0) drawFrame(lastIdx);
    };

    const onScroll = () => {
      const rect = container.getBoundingClientRect();
      targetP = Math.max(0, Math.min(1, -rect.top / (container.offsetHeight - window.innerHeight)));
    };

    const tick = () => {
      if (frames.length) {
        smoothP += (targetP - smoothP) * 0.12;
        const idx = Math.round(smoothP * (frames.length - 1));
        if (idx !== lastIdx) { lastIdx = idx; drawFrame(idx); }
        if (ov1) setOverlay(ov1, smoothP, 0.28, 0.37, 0.52, 0.60);
        if (ov2) setOverlay(ov2, smoothP, 0.62, 0.70, 0.88, 0.97);
      }
      rafId = requestAnimationFrame(tick);
    };

    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', resize);
    onScroll();
    resize();
    rafId = requestAnimationFrame(tick);

    // ── Extract all frames once by playing at 2× speed ──
    // Forward/backward scrubbing then becomes a pure array lookup — no seeking ever.
    const vid = document.createElement('video');
    vid.src = 'pill.mp4';
    vid.muted = true;
    vid.playsInline = true;
    vid.preload = 'auto';
    vid.style.cssText = 'position:fixed;opacity:0;pointer-events:none;width:1px;height:1px;top:-9999px';
    document.body.appendChild(vid);

    const makeFrame = (w, h) => {
      try { return new OffscreenCanvas(w, h); }
      catch (_) { const c = document.createElement('canvas'); c.width = w; c.height = h; return c; }
    };

    const extract = async () => {
      await new Promise(res => {
        if (vid.readyState >= 1) { res(); return; }
        vid.addEventListener('loadedmetadata', res, { once: true });
        vid.load();
      });

      const dur  = vid.duration;
      const step = 1 / 15; // capture at 15 fps
      let next   = 0;

      vid.currentTime = 0;
      await new Promise(res => {
        if (vid.currentTime < 0.001) { res(); return; }
        vid.addEventListener('seeked', res, { once: true });
      });

      vid.playbackRate = 2; // extract in half real-time

      await new Promise(res => {
        vid.addEventListener('ended', res, { once: true });
        const loop = () => {
          while (vid.currentTime + 0.001 >= next && next <= dur + step) {
            const f = makeFrame(vid.videoWidth, vid.videoHeight);
            f.getContext('2d').drawImage(vid, 0, 0);
            frames.push(f);
            next += step;
            setLoadPct(Math.round(Math.min(next / dur, 1) * 100));
          }
          if (vid.ended || vid.currentTime >= dur - step * 0.5) { res(); return; }
          requestAnimationFrame(loop);
        };
        vid.play().then(() => requestAnimationFrame(loop)).catch(res);
      });

      setReady(true);
      drawFrame(0);
    };

    extract().catch(console.warn);

    return () => {
      window.removeEventListener('scroll', onScroll);
      window.removeEventListener('resize', resize);
      cancelAnimationFrame(rafId);
      vid.pause();
      if (vid.parentNode) vid.parentNode.removeChild(vid);
      frames.forEach(f => f.close?.());
    };
  }, []);

  return (
    <div ref={containerRef} className="microbe-container" style={{ height: "350vh" }}>
      <div className="microbe-sticky">
        <canvas ref={canvasRef} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', background: '#000' }} />
        {!ready && (
          <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: 2, background: 'rgba(255,255,255,0.1)' }}>
            <div style={{ height: '100%', background: 'rgba(255,255,255,0.55)', width: `${loadPct}%`, transition: 'width 0.15s linear' }} />
          </div>
        )}
        <div ref={overlay1Ref} className="microbe-overlay">
          <p>We are currently under development</p>
        </div>
        <div ref={overlay2Ref} className="microbe-overlay">
          <p>But we are at your front door</p>
          <p className="punchline">Summer 2026</p>
        </div>
      </div>
    </div>
  );
};
